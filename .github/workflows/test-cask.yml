name: Test cask

on:
  push:
    paths:
      - "Casks/**"
      - ".github/workflows/test-cask.yml"
  pull_request:
    paths:
      - "Casks/**"
  workflow_dispatch:
  schedule:
    # Mondays 12:00 UTC. Catches a future release whose DMG changed
    # while this cask still points at an old version/sha256.
    - cron: "0 12 * * 1"

jobs:
  install:
    name: brew install (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: Apple Silicon
          - os: macos-13
            label: Intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Homebrew rejects installing a cask from a bare file path, so tap the
      # checked-out repo as a local tap (dontoreve/golem) and install by token.
      - name: Tap this repo locally
        run: brew tap dontoreve/golem "$GITHUB_WORKSPACE"

      - name: Style + audit (informative)
        continue-on-error: true
        run: |
          brew style dontoreve/golem/golem-type || true
          brew audit --cask --online dontoreve/golem/golem-type || true

      - name: Install the cask (downloads + mounts the DMG, copies the app)
        run: brew install --cask --no-quarantine dontoreve/golem/golem-type

      - name: Verify Golem.app landed in /Applications
        run: |
          test -d "/Applications/Golem.app"
          echo "OK: Golem.app installed on ${{ matrix.label }}"

      - name: Uninstall (cleanup)
        if: always()
        run: brew uninstall --cask --force dontoreve/golem/golem-type || true
